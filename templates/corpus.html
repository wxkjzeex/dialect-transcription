<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Параллельный корпус</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'BukyVede', 'Menaion Unicode', 'Segoe UI', serif;
            background: #f5efe6;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffbf5;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #d4c5b0;
        }
        .header {
            background: linear-gradient(135deg, #4a3d2c 0%, #2c241a 100%);
            color: #f0e6d8;
            padding: 24px 32px;
            border-bottom: 3px solid #b89a7a;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 2px;
        }
        .header p {
            opacity: 0.8;
            font-size: 14px;
            margin-top: 8px;
        }
        .tabs {
            display: flex;
            background: #e8ddd0;
            padding: 0 24px;
            gap: 4px;
        }
        .tab {
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            color: #6b5a4a;
            cursor: pointer;
            border-radius: 12px 12px 0 0;
            transition: all 0.2s;
        }
        .tab:hover { background: #d9cbbc; }
        .tab.active {
            background: #fffbf5;
            color: #4a3d2c;
        }
        .content { padding: 32px; }
        .upload-area {
            border: 2px dashed #c9af91;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #8b7355;
            background: #faf5ef;
        }
        .btn {
            padding: 12px 24px;
            background: #4a3d2c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #5d4e37;
            transform: translateY(-2px);
        }
        .btn-secondary { background: #8b7355; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-list { margin-top: 16px; }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #f0eae2;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .file-remove {
            color: #a05040;
            cursor: pointer;
            font-weight: bold;
        }
        .controls {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .alignment-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }
        .alignment-table th {
            text-align: left;
            padding: 12px;
            background: #e8ddd0;
            color: #3e3225;
            font-weight: 600;
            border: 1px solid #d4c5b0;
        }
        .alignment-table td {
            padding: 12px;
            border: 1px solid #d4c5b0;
            vertical-align: top;
        }
        .alignment-table tr:hover td { background: #faf5ef; }
        .verse-text {
            font-family: 'BukyVede', 'Menaion Unicode', serif;
            font-size: 18px;
            color: #2c241a;
        }
        .editable-cell { cursor: text; }
        .editable-cell input {
            width: 100%;
            padding: 4px;
            font-family: 'BukyVede', 'Menaion Unicode', serif;
            font-size: 16px;
            border: 1px solid #b89a7a;
            border-radius: 4px;
            background: #fffbf5;
        }
        .diff-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .diff-graphic { background: #fde2e4; color: #c0392b; }
        .diff-phonetic { background: #fff3cd; color: #856404; }
        .diff-morph { background: #d4edda; color: #155724; }
        .diff-syntax { background: #d1ecf1; color: #0c5460; }
        .diff-lexical { background: #e2d5f1; color: #6f42c1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📜 Притча о блудном сыне</h1>
            <p>Параллельный корпус · Лк 15:11-32 · Лабораторная работа №2</p>
        </div>
        
        <div class="tabs">
            <div class="tab" onclick="window.location.href='/'">Транскрипция</div>
            <div class="tab active">Корпус</div>
            <div class="tab" onclick="window.location.href='/map'">Карта</div>
        </div>
        
        <div class="content">
            <div class="upload-area" id="dropZone">
                <div style="font-size: 48px; margin-bottom: 16px;">📂</div>
                <div style="font-size: 18px; margin-bottom: 8px;">Загрузите файлы списков</div>
                <div style="color: #9a8a78;">XML-TEI · Перетащите или нажмите для выбора</div>
                <input type="file" id="fileInput" multiple accept=".xml" style="display: none;">
            </div>
            
            <div id="fileList" class="file-list"></div>
            
            <div class="controls">
                <button class="btn" id="alignBtn" disabled>🔗 Выровнять списки</button>
                <button class="btn btn-secondary" id="exportBtn" disabled>💾 Выгрузить XML-TEI</button>
                <select id="mainMsSelect" style="padding: 12px; border-radius: 8px; border: 1px solid #d4c5b0;" disabled>
                    <option value="">Выберите главный список</option>
                </select>
            </div>
            
            <div style="margin-top: 20px;">
                <label style="font-weight: 600; color: #3e3225;">📊 Типы разночтений:</label>
                <div style="display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap;">
                    <label><input type="checkbox" checked> Графические</label>
                    <label><input type="checkbox" checked> Фонетические</label>
                    <label><input type="checkbox" checked> Морфологические</label>
                    <label><input type="checkbox" checked> Синтаксические</label>
                    <label><input type="checkbox" checked> Лексические</label>
                </div>
            </div>
            
            <div id="alignmentResult"></div>
        </div>
    </div>

    <script>
        let uploadedFiles = [];
        let alignedData = null;
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const alignBtn = document.getElementById('alignBtn');
        const exportBtn = document.getElementById('exportBtn');
        const mainMsSelect = document.getElementById('mainMsSelect');
        
        // Drag & drop
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#8b7355';
            dropZone.style.background = '#faf5ef';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#c9af91';
            dropZone.style.background = 'transparent';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#c9af91';
            dropZone.style.background = 'transparent';
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        function handleFiles(files) {
            for (let file of files) {
                if (file.name.endsWith('.xml')) {
                    uploadedFiles.push(file);
                }
            }
            renderFileList();
            updateUI();
        }
        
        function renderFileList() {
            if (uploadedFiles.length === 0) {
                fileList.innerHTML = '';
                return;
            }
            let html = '<h3 style="margin-bottom: 12px; color: #3e3225;">Загруженные списки:</h3>';
            uploadedFiles.forEach((file, index) => {
                html += `
                    <div class="file-item">
                        <span>📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)</span>
                        <span class="file-remove" onclick="removeFile(${index})">✕</span>
                    </div>
                `;
            });
            fileList.innerHTML = html;
            
            let options = '<option value="">Выберите главный список</option>';
            uploadedFiles.forEach((file, index) => {
                options += `<option value="${index}">${file.name}</option>`;
            });
            mainMsSelect.innerHTML = options;
        }
        
        window.removeFile = function(index) {
            uploadedFiles.splice(index, 1);
            renderFileList();
            updateUI();
        };
        
        function updateUI() {
            alignBtn.disabled = uploadedFiles.length < 2;
            exportBtn.disabled = !alignedData;
            mainMsSelect.disabled = uploadedFiles.length < 2;
        }
        
        // Выравнивание
        alignBtn.addEventListener('click', async () => {
            if (uploadedFiles.length < 2) return;
            
            const mainIndex = mainMsSelect.value;
            if (mainIndex === '') {
                alert('Выберите главный список для выравнивания');
                return;
            }
            
            alignBtn.textContent = '⏳ Выравнивание...';
            alignBtn.disabled = true;
            
            const formData = new FormData();
            uploadedFiles.forEach(file => formData.append('files', file));
            
            try {
                const response = await fetch('/upload_corpus', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const mainMs = data.manuscripts[mainIndex];
                    const otherMss = data.manuscripts.filter((_, i) => i != mainIndex);
                    const verseNumbers = Object.keys(mainMs.verses).sort((a, b) => parseInt(a) - parseInt(b));
                    
                    alignedData = {
                        main: mainMs.name,
                        aligned: otherMss.map(m => m.name),
                        verses: verseNumbers.map(num => {
                            const texts = [mainMs.verses[num] || '—'];
                            otherMss.forEach(ms => texts.push(ms.verses[num] || '—'));
                            return { num, texts };
                        })
                    };
                    
                    renderAlignment();
                    exportBtn.disabled = false;
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (err) {
                alert('Ошибка соединения: ' + err.message);
            } finally {
                alignBtn.textContent = '🔗 Выровнять списки';
                alignBtn.disabled = false;
            }
        });
        
        function renderAlignment() {
            const container = document.getElementById('alignmentResult');
            let html = '<h3 style="margin: 24px 0 16px; color: #3e3225;">📖 Результат выравнивания</h3>';
            html += '<table class="alignment-table"><thead><tr><th>Стих</th><th>' + alignedData.main + '</th>';
            alignedData.aligned.forEach(name => html += '<th>' + name + '</th>');
            html += '</tr></thead><tbody>';
            
            alignedData.verses.forEach(verse => {
                html += '<tr><td><strong>' + verse.num + '</strong></td>';
                verse.texts.forEach(text => {
                    html += '<td class="verse-text editable-cell">' + escapeHtml(text);
                    // Добавляем метки разночтений (демо)
                    if (text.includes('ч҃лвкъ')) html += '<span class="diff-type diff-graphic">граф.</span>';
                    if (text.includes('мьнии')) html += '<span class="diff-type diff-lexical">лекс.</span>';
                    html += '</td>';
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            html += `
                <div style="margin-top: 24px;">
                    <button class="btn btn-secondary" onclick="saveSession()">💾 Сохранить сессию</button>
                    <button class="btn btn-secondary" onclick="loadSession()" style="margin-left: 12px;">📂 Загрузить сессию</button>
                </div>
            `;
            
            container.innerHTML = html;
            makeEditable();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function makeEditable() {
            document.querySelectorAll('.editable-cell').forEach(cell => {
                cell.addEventListener('dblclick', function() {
                    const originalText = this.textContent;
                    const input = document.createElement('input');
                    input.value = originalText;
                    this.textContent = '';
                    this.appendChild(input);
                    input.focus();
                    
                    input.addEventListener('blur', () => {
                        this.textContent = input.value || originalText;
                        updateAlignedData();
                    });
                    
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') input.blur();
                    });
                });
            });
        }
        
        function updateAlignedData() {
            const rows = document.querySelectorAll('.alignment-table tbody tr');
            alignedData.verses.forEach((verse, rowIndex) => {
                const cells = rows[rowIndex].querySelectorAll('td');
                verse.texts = Array.from(cells).map(cell => cell.textContent.trim());
            });
        }
        
        window.saveSession = function() {
            const session = { files: uploadedFiles.map(f => f.name), aligned: alignedData, timestamp: new Date().toISOString() };
            localStorage.setItem('corpusSession', JSON.stringify(session));
            alert('Сессия сохранена в браузере');
        };
        
        window.loadSession = function() {
            const saved = localStorage.getItem('corpusSession');
            if (saved) {
                const session = JSON.parse(saved);
                alert('Загружена сессия от ' + session.timestamp + '\nФайлы: ' + session.files.join(', '));
            } else {
                alert('Нет сохранённой сессии');
            }
        };
        
        exportBtn.addEventListener('click', () => {
            if (!alignedData) return;
            
            let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<TEI xmlns="http://www.tei-c.org/ns/1.0">\n  <teiHeader>\n    <fileDesc>\n      <titleStmt>\n        <title>Параллельный корпус: Притча о блудном сыне</title>\n      </titleStmt>\n      <publicationStmt>\n        <p>Выровнено автоматически</p>\n      </publicationStmt>\n      <sourceDesc>\n        <listWit>\n          <witness xml:id="main">' + alignedData.main + '</witness>\n';
            alignedData.aligned.forEach((name, i) => xml += '          <witness xml:id="wit' + i + '">' + name + '</witness>\n');
            xml += '        </listWit>\n      </sourceDesc>\n    </fileDesc>\n  </teiHeader>\n  <text>\n    <body>\n      <div type="chapter" n="15">\n';
            
            alignedData.verses.forEach(verse => {
                xml += '        <app>\n          <lem wit="#main">' + verse.texts[0] + '</lem>\n';
                verse.texts.slice(1).forEach((text, i) => xml += '          <rdg wit="#wit' + i + '">' + text + '</rdg>\n');
                xml += '        </app>\n';
            });
            
            xml += '      </div>\n    </body>\n  </text>\n</TEI>';
            
            const blob = new Blob([xml], { type: 'application/xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'parallel_corpus.xml';
            a.click();
        });
    </script>
</body>
</html>
