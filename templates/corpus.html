<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Параллельный корпус · Притча о блудном сыне</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'BukyVede', 'Menaion Unicode', 'Segoe UI', serif;
            background: #f5efe6;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffbf5;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #d4c5b0;
        }
        .header {
            background: linear-gradient(135deg, #4a3d2c 0%, #2c241a 100%);
            color: #f0e6d8;
            padding: 24px 32px;
            border-bottom: 3px solid #b89a7a;
        }
        .header h1 { font-size: 28px; font-weight: 400; letter-spacing: 2px; }
        .header p { opacity: 0.8; font-size: 14px; margin-top: 8px; }
        .tabs {
            display: flex;
            background: #e8ddd0;
            padding: 0 24px;
            gap: 4px;
        }
        .tab {
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            color: #6b5a4a;
            cursor: pointer;
            border-radius: 12px 12px 0 0;
            transition: all 0.2s;
        }
        .tab:hover { background: #d9cbbc; }
        .tab.active { background: #fffbf5; color: #4a3d2c; }
        .content { padding: 32px; }
        .upload-area {
            border: 2px dashed #c9af91;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover { border-color: #8b7355; background: #faf5ef; }
        .btn {
            padding: 12px 24px;
            background: #4a3d2c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #5d4e37; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #8b7355; }
        .file-list { margin-top: 16px; }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #f0eae2;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .file-remove { color: #a05040; cursor: pointer; font-weight: bold; }
        .controls {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .alignment-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
            font-size: 14px;
        }
        .alignment-table th {
            text-align: left;
            padding: 12px;
            background: #e8ddd0;
            color: #3e3225;
            font-weight: 600;
            border: 1px solid #d4c5b0;
        }
        .alignment-table td {
            padding: 12px;
            border: 1px solid #d4c5b0;
            vertical-align: top;
            font-family: 'BukyVede', 'Menaion Unicode', serif;
        }
        .alignment-table tr:hover td { background: #faf5ef; }
                .verse-text {
            font-size: 15px;
            color: #2c241a;
            cursor: text;
            transition: background 0.2s;
        }
        .verse-text:hover {
            background: #f0eae2;
        }
        .verse-text.editing {
            padding: 0;
        }
        .verse-text textarea {
            width: 100%;
            min-height: 80px;
            padding: 8px;
            font-family: 'BukyVede', 'Menaion Unicode', serif;
            font-size: 14px;
            border: 2px solid #b89a7a;
            border-radius: 6px;
            background: #fffbf5;
            resize: vertical;
        }
        .progress {
            margin: 20px 0;
            padding: 12px;
            background: #e8ddd0;
            border-radius: 8px;
            text-align: center;
        }
                /* Панель выбора колонок */
        .column-toggles {
            background: #f8f2ea;
            border-radius: 12px;
            padding: 16px 20px;
            margin: 20px 0;
            border: 1px solid #d4c5b0;
        }
        .column-toggles-title {
            font-weight: 600;
            color: #3e3225;
            margin-bottom: 12px;
        }
        .column-toggles-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .column-toggle-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 4px 12px;
            background: #fffbf5;
            border-radius: 20px;
            border: 1px solid #d4c5b0;
            transition: all 0.2s;
        }
        .column-toggle-item:hover {
            background: #e8ddd0;
        }
        .column-toggle-item input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        .column-toggle-item label {
            cursor: pointer;
            font-size: 13px;
            color: #4a3d2c;
        }
        .column-toggle-item.disabled {
            opacity: 0.5;
            background: #e0d3c4;
        }
        /* Скрытые колонки */
        .hidden-column {
            display: none !important;
        }
        .alignment-table .hidden-column {
            display: none;
        }
                /* Drag & Drop для колонок */
        .alignment-table th.draggable {
            cursor: grab;
            user-select: none;
            position: relative;
            padding-right: 28px !important;
        }
        .alignment-table th.draggable:hover {
            background: #d4c5b0;
        }
        .alignment-table th.draggable:active {
            cursor: grabbing;
        }
        .alignment-table th.draggable::after {
            content: "⋮⋮";
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b7355;
            font-size: 16px;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .alignment-table th.drag-over {
            border-left: 3px solid #b89a7a !important;
            background: #e8ddd0;
        }
        .alignment-table th.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }
        /* Кнопки управления порядком (альтернатива drag & drop) */
        .column-order-controls {
            display: flex;
            gap: 4px;
            margin-left: 8px;
        }
        .order-btn {
            padding: 2px 6px;
            background: #d4c5b0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: #3e3225;
            transition: all 0.2s;
        }
        .order-btn:hover {
            background: #b89a7a;
            color: white;
        }
        .order-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
                /* Типы разночтений */
        .diff-graphic {
            background: #fde2e4 !important;
            border-bottom: 2px solid #c0392b;
        }
        .diff-phonetic {
            background: #fff3cd !important;
            border-bottom: 2px solid #d4a017;
        }
        .diff-morph {
            background: #d4edda !important;
            border-bottom: 2px solid #27ae60;
        }
        .diff-lexical {
            background: #e2d5f1 !important;
            border-bottom: 2px solid #8e44ad;
        }
        .diff-syntax {
            background: #d1ecf1 !important;
            border-bottom: 2px solid #2980b9;
        }
        
        /* Панель фильтрации типов */
        .diff-filters {
            background: #f0eae2;
            border-radius: 12px;
            padding: 16px 20px;
            margin: 20px 0;
            border: 1px solid #d4c5b0;
        }
        .diff-filters-title {
            font-weight: 600;
            color: #3e3225;
            margin-bottom: 12px;
        }
        .diff-filters-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .diff-filter-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 4px 12px;
            background: #fffbf5;
            border-radius: 20px;
            border: 1px solid #d4c5b0;
            transition: all 0.2s;
        }
        .diff-filter-item:hover {
            background: #e8ddd0;
        }
        .diff-filter-item input {
            cursor: pointer;
        }
        .diff-filter-item label {
            cursor: pointer;
            font-size: 13px;
            color: #4a3d2c;
        }
        .diff-filter-item .color-badge {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📜 Притча о блудном сыне</h1>
            <p>Параллельный корпус · Лк 15:11-32 · Лабораторная работа №2</p>
        </div>
        
        <div class="tabs">
            <div class="tab" onclick="window.location.href='/'">Транскрипция</div>
            <div class="tab active">Корпус</div>
            <div class="tab" onclick="window.location.href='/map'">Карта</div>
        </div>
        
        <div class="content">
            <div class="upload-area" id="dropZone">
                <div style="font-size: 48px; margin-bottom: 16px;">📂</div>
                <div style="font-size: 18px; margin-bottom: 8px;">Загрузите файлы списков</div>
                <div style="color: #9a8a78;">XML-TEI · Перетащите или нажмите для выбора</div>
                <input type="file" id="fileInput" multiple accept=".xml" style="display: none;">
            </div>
            
            <div id="fileList" class="file-list"></div>
            
            <div class="controls">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <label style="font-size: 13px; color: #3e3225;">Листы главного списка:</label>
                    <input type="number" id="folioStart" placeholder="От" min="1" max="500" value="117" style="width: 70px; padding: 8px; border-radius: 6px; border: 1px solid #d4c5b0;">
                    <span>–</span>
                    <input type="number" id="folioEnd" placeholder="До" min="1" max="500" value="119" style="width: 70px; padding: 8px; border-radius: 6px; border: 1px solid #d4c5b0;">
                </div>
                <button class="btn" id="alignBtn" disabled>🔗 Выровнять списки</button>
                <button class="btn btn-secondary" id="exportBtn" disabled>💾 Выгрузить XML-TEI</button>
                <select id="mainMsSelect" style="padding: 12px; border-radius: 8px; border: 1px solid #d4c5b0;" disabled>
                    <option value="">Выберите главный список</option>
                </select>
            </div>
            
            <div id="progress" style="display: none;"></div>
            <div id="alignmentResult"></div>
        </div>
    </div>

    <script>
        // Настройки отображения типов разночтений
        let diffTypesEnabled = {
            graphic: true,
            phonetic: true,
            morph: true,
            lexical: true,
            syntax: true
        };
        let uploadedFiles = [];
        let manuscripts = [];  // [{ name, fullText, sheets }]
        let columnVisibility = []; // true = показывать, false = скрыть
        let columnOrder = []; // индексы в порядке отображения
        let alignedData = null;
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const alignBtn = document.getElementById('alignBtn');
        const exportBtn = document.getElementById('exportBtn');
        const mainMsSelect = document.getElementById('mainMsSelect');
        const progressDiv = document.getElementById('progress');
        const folioStart = document.getElementById('folioStart');
        const folioEnd = document.getElementById('folioEnd');
        
        // Drag & drop
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#8b7355';
            dropZone.style.background = '#faf5ef';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#c9af91';
            dropZone.style.background = 'transparent';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#c9af91';
            dropZone.style.background = 'transparent';
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        // Функция извлечения текста из XML
        function extractTextFromXML(xmlString) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlString, 'application/xml');
            
            const words = [];
            const sheets = [];
            let currentSheet = null;
            
            // Проходим по всем элементам в порядке их следования
            const allElements = doc.querySelectorAll('*');
            
            for (let el of allElements) {
                // Отслеживаем листы
                if (el.tagName === 'milestone' && el.getAttribute('unit') === 'sheet') {
                    const n = el.getAttribute('n');
                    if (n) {
                        currentSheet = parseInt(n);
                        if (!isNaN(currentSheet)) {
                            sheets.push({ index: words.length, sheet: currentSheet });
                        }
                    }
                }
                
                // Собираем текст из w и pc
                if (el.tagName === 'w' || el.tagName === 'pc') {
                    const t = el.textContent.trim();
                    if (t && !['·', '⸱', '※', '∽', ':', '.', '⁘'].includes(t)) {
                        words.push(t);
                    }
                }
            }
            
            return {
                fullText: words.join(' '),
                words: words,
                sheets: sheets
            };
        }
        
        // Фильтрация текста по листам
        function filterTextBySheets(data, startSheet, endSheet) {
            if (!startSheet || !endSheet) return data.fullText;
            
            const start = parseInt(startSheet);
            const end = parseInt(endSheet);
            
            // Находим индексы слов для указанных листов
            let startIdx = 0;
            let endIdx = data.words.length;
            
            for (let sheet of data.sheets) {
                if (sheet.sheet === start) {
                    startIdx = sheet.index;
                }
                if (sheet.sheet === end + 1) {
                    endIdx = sheet.index;
                    break;
                }
            }
            
            return data.words.slice(startIdx, endIdx).join(' ');
        }
        
        // Разбиение текста на стихи
        function splitIntoVerses(text, verseCount = 22, startVerse = 11) {
            const verses = {};
            const allWords = text.split(/\s+/).filter(w => w.length > 0);
            const chunkSize = Math.ceil(allWords.length / verseCount);
            
            for (let v = 0; v < verseCount; v++) {
                const start = v * chunkSize;
                const end = Math.min((v + 1) * chunkSize, allWords.length);
                const verseText = allWords.slice(start, end).join(' ');
                if (verseText) {
                    verses[String(v + startVerse)] = verseText.substring(0, 400) + (verseText.length > 400 ? '...' : '');
                }
            }
            
            return verses;
        }
        
        async function handleFiles(files) {
            for (let file of files) {
                if (file.name.endsWith('.xml') && !uploadedFiles.find(f => f.name === file.name)) {
                    uploadedFiles.push(file);
                }
            }
            renderFileList();
            
            if (uploadedFiles.length > 0) {
                progressDiv.style.display = 'block';
                progressDiv.className = 'progress';
                progressDiv.innerHTML = '⏳ Парсинг XML-файлов...';
                
                manuscripts = [];
                
                for (let i = 0; i < uploadedFiles.length; i++) {
                    const file = uploadedFiles[i];
                    progressDiv.innerHTML = `⏳ Парсинг ${i+1}/${uploadedFiles.length}: ${file.name}...`;
                    
                    try {
                        const xmlText = await file.text();
                        const extracted = extractTextFromXML(xmlText);
                        
                        manuscripts.push({
                            name: file.name,
                            data: extracted,
                        });
                        
                    } catch (err) {
                        console.error('Ошибка парсинга:', file.name, err);
                        manuscripts.push({
                            name: file.name,
                            data: { fullText: '[Ошибка парсинга]', words: [], sheets: [] }
                        });
                    }
                }
                
                progressDiv.innerHTML = '✅ Парсинг завершён!';
                setTimeout(() => { progressDiv.style.display = 'none'; }, 1500);
            }
            
            updateUI();
        }
        
        function renderFileList() {
            if (uploadedFiles.length === 0) {
                fileList.innerHTML = '';
                return;
            }
            let html = '<h3 style="margin-bottom: 12px; color: #3e3225;">Загруженные списки:</h3>';
            uploadedFiles.forEach((file, index) => {
                html += `
                    <div class="file-item">
                        <span>📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)</span>
                        <span class="file-remove" onclick="removeFile(${index})">✕</span>
                    </div>
                `;
            });
            fileList.innerHTML = html;
            
            let options = '<option value="">Выберите главный список</option>';
            uploadedFiles.forEach((file, index) => {
                options += `<option value="${index}">${file.name}</option>`;
            });
            mainMsSelect.innerHTML = options;
        }
        
        window.removeFile = function(index) {
            uploadedFiles.splice(index, 1);
            manuscripts.splice(index, 1);
            renderFileList();
            updateUI();
        };
        
        function updateUI() {
            alignBtn.disabled = uploadedFiles.length < 2;
            exportBtn.disabled = !alignedData;
            mainMsSelect.disabled = uploadedFiles.length < 2;
        }
        
        // Выравнивание (учитывает листы)
        alignBtn.addEventListener('click', () => {
            if (uploadedFiles.length < 2) return;
            
            const mainIndex = parseInt(mainMsSelect.value);
            if (isNaN(mainIndex)) {
                alert('Выберите главный список');
                return;
            }
            
            const startSheet = folioStart.value;
            const endSheet = folioEnd.value;
            
            // Фильтруем текст главного списка по листам
            const mainMs = manuscripts[mainIndex];
            const mainText = filterTextBySheets(mainMs.data, startSheet, endSheet);
            const mainVerses = splitIntoVerses(mainText);
            
            // Для остальных списков берём полный текст
            const otherMss = manuscripts.filter((_, i) => i !== mainIndex);
            const otherVerses = otherMss.map(ms => splitIntoVerses(ms.data.fullText));
            
            // Собираем все номера стихов
            const allVerseNums = new Set(Object.keys(mainVerses));
            otherVerses.forEach(v => Object.keys(v).forEach(k => allVerseNums.add(k)));
            const verseNumbers = Array.from(allVerseNums).sort((a, b) => parseInt(a) - parseInt(b));
            
            alignedData = {
                main: mainMs.name,
                aligned: otherMss.map(m => m.name),
                verses: verseNumbers.map(num => {
                    const texts = [mainVerses[num] || '—'];
                    otherVerses.forEach(v => texts.push(v[num] || '—'));
                    return { num, texts };
                })
            };
            
            renderOrderedTable();
            exportBtn.disabled = false;
        });

        function renderColumnToggles() {
            if (!alignedData) return '';
            
            const allColumns = [alignedData.main, ...alignedData.aligned];
            
            if (columnVisibility.length !== allColumns.length) {
                columnVisibility = allColumns.map(() => true);
            }
            
            let html = '<div class="column-toggles">';
            html += '<div class="column-toggles-title">👁️ Показывать списки:</div>';
            html += '<div class="column-toggles-list">';
            
            // Показываем в исходном порядке (по индексам)
            allColumns.forEach((name, index) => {
                const checked = columnVisibility[index] ? 'checked' : '';
                const isMain = index === 0;
                html += `
                    <div class="column-toggle-item" onclick="toggleColumn(${index})">
                        <input type="checkbox" id="colToggle${index}" ${checked} ${isMain ? 'disabled' : ''}>
                        <label for="colToggle${index}" style="${isMain ? 'font-weight:600;' : ''}">${name}</label>
                        ${isMain ? '<span style="font-size:11px; color:#8b7355;">(главный)</span>' : ''}
                    </div>
                `;
            });
            
            html += '</div></div>';
            return html;
        }
        
        window.toggleColumn = function(index) {
            const checkbox = document.getElementById(`colToggle${index}`);
            if (checkbox) {
                columnVisibility[index] = checkbox.checked;
                applyColumnVisibility();
            }
        };
        
        function applyColumnVisibility() {
            if (!alignedData) return;
            
            const table = document.querySelector('.alignment-table');
            if (!table) return;
            
            // Получаем все заголовки (кроме первого "Стих")
            const headers = table.querySelectorAll('thead th:not(:first-child)');
            
            headers.forEach((th, idx) => {
                const colIndex = parseInt(th.dataset.colIndex);
                if (!columnVisibility[colIndex]) {
                    th.classList.add('hidden-column');
                } else {
                    th.classList.remove('hidden-column');
                }
            });
            
            // Скрываем/показываем ячейки
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td:not(:first-child)');
                cells.forEach((td, idx) => {
                    const headerForCell = headers[idx];
                    if (headerForCell) {
                        const colIndex = parseInt(headerForCell.dataset.colIndex);
                        if (!columnVisibility[colIndex]) {
                            td.classList.add('hidden-column');
                        } else {
                            td.classList.remove('hidden-column');
                        }
                    }
                });
            });
        }

        // Инициализация порядка колонок
        function initColumnOrder() {
            if (!alignedData) return;
            const totalCols = 1 + alignedData.aligned.length; // +1 для главного
            if (columnOrder.length !== totalCols) {
                columnOrder = Array.from({ length: totalCols }, (_, i) => i);
            }
        }
        
        // Перемещение колонки
        function moveColumn(fromIndex, toIndex) {
            if (fromIndex === 0 || toIndex === 0) {
                alert('Главный список всегда должен быть первым');
                return false;
            }
            
            if (fromIndex === toIndex) return false;
            
            const item = columnOrder.splice(fromIndex, 1)[0];
            columnOrder.splice(toIndex, 0, item);
            
            // Перестраиваем alignedData в соответствии с новым порядком
            reorderAlignedData();
            
            return true;
        }
        
        // Перестроение alignedData согласно columnOrder
        function reorderAlignedData() {
            if (!alignedData) return;
            
            // Собираем все тексты в правильном порядке
            const newVerses = alignedData.verses.map(verse => {
                const newTexts = columnOrder.map(idx => verse.texts[idx]);
                return { num: verse.num, texts: newTexts };
            });
            
            alignedData.verses = newVerses;
            
            // Обновляем список aligned (имена списков)
            const allNames = [alignedData.main, ...alignedData.aligned];
            const newAlignedNames = columnOrder.slice(1).map(idx => allNames[idx]);
            alignedData.aligned = newAlignedNames;
        }

        // ==================== ОПРЕДЕЛЕНИЕ ТИПОВ РАЗНОЧТЕНИЙ ====================

        // Графические пары (разные буквы для одного звука)
        const GRAPHIC_PAIRS = [
            ['ѹ', 'у'], ['ꙋ', 'у'], ['оу', 'у'],
            ['ѡ', 'о'], ['ꙩ', 'о'],
            ['ѣ', 'е'], ['ꙗ', 'я'], ['ѧ', 'я'],
            ['і', 'и'], ['ї', 'и'], ['ѵ', 'и'],
            ['ѳ', 'ф'], ['ѯ', 'кс'], ['ѱ', 'пс'],
            ['ꙁ', 'з'], ['ѕ', 'з'],
            ['ꙑ', 'ы'], ['ꙓ', 'е'],
            ['҃', ''], ['҄', ''], ['҅', ''], ['҆', ''], // титла
            ['·', ''], ['⸱', ''], ['※', ''], ['∽', '']
        ];
        
        // Фонетические признаки (чередования)
        const PHONETIC_PATTERNS = [
            ['оро', 'ра'], ['оло', 'ла'], ['ере', 'ре'], ['ело', 'ле'], // полногласие
            ['жд', 'ж'], ['щ', 'ч'], ['ц', 'ч'], ['з', 'ж'], ['с', 'ш'],
            ['г', 'ж'], ['к', 'ч'], ['х', 'ш']
        ];
        
        // Морфологические окончания
        const MORPH_ENDINGS = [
            ['ъ', ''], ['ь', ''],
            ['ого', 'ова'], ['его', 'ева'],
            ['ыя', 'ой'], ['ия', 'ей'],
            ['ти', 'ть'], ['щи', 'чь'],
            ['аго', 'ого'], ['яго', 'его'],
            ['ѣ', 'е']
        ];
        
        function normalizeText(text) {
            if (!text) return '';
            // Убираем титла, знаки препинания, приводим к нижнему регистру
            return text.toLowerCase()
                .replace(/[·⸱※∽⁘:.,;!?·\s]+/g, ' ')
                .replace(/[҃҄҅҆]/g, '')
                .trim();
        }
        
        function detectDiffType(mainText, otherText) {
            if (!mainText || !otherText) return null;
            if (mainText === otherText) return null;
            
            const mainNorm = normalizeText(mainText);
            const otherNorm = normalizeText(otherText);
            
            if (mainNorm === otherNorm) return null;
            
            // Разбиваем на слова
            const mainWords = mainNorm.split(/\s+/).filter(w => w.length > 0);
            const otherWords = otherNorm.split(/\s+/).filter(w => w.length > 0);
            
            // Если текст слишком разный по длине — скорее всего лексическое
            if (Math.abs(mainWords.length - otherWords.length) > mainWords.length * 0.5) {
                return 'lexical';
            }
            
            // Проверяем каждую пару слов
            let graphicCount = 0;
            let phoneticCount = 0;
            let morphCount = 0;
            let totalCompared = 0;
            
            const minLength = Math.min(mainWords.length, otherWords.length);
            
            for (let i = 0; i < minLength; i++) {
                const w1 = mainWords[i];
                const w2 = otherWords[i];
                
                if (w1 === w2) continue;
                totalCompared++;
                
                // 1. Графические
                let w1Graphic = w1;
                let w2Graphic = w2;
                for (let [old, new_] of GRAPHIC_PAIRS) {
                    const regex = new RegExp(old, 'g');
                    w1Graphic = w1Graphic.replace(regex, new_);
                    w2Graphic = w2Graphic.replace(regex, new_);
                }
                if (w1Graphic === w2Graphic) {
                    graphicCount++;
                    continue;
                }
                
                // 2. Фонетические
                let phoneticMatch = false;
                for (let [p1, p2] of PHONETIC_PATTERNS) {
                    if ((w1.includes(p1) && w2.includes(p2)) || (w1.includes(p2) && w2.includes(p1))) {
                        const w1without = w1.replace(new RegExp(p1, 'g'), '').replace(new RegExp(p2, 'g'), '');
                        const w2without = w2.replace(new RegExp(p1, 'g'), '').replace(new RegExp(p2, 'g'), '');
                        if (w1without === w2without && w1without.length > 0) {
                            phoneticMatch = true;
                            break;
                        }
                    }
                }
                if (phoneticMatch) {
                    phoneticCount++;
                    continue;
                }
                
                // 3. Морфологические
                let morphMatch = false;
                for (let [e1, e2] of MORPH_ENDINGS) {
                    if ((w1.endsWith(e1) && w2.endsWith(e2)) || (w1.endsWith(e2) && w2.endsWith(e1))) {
                        const stem1 = w1.endsWith(e1) ? w1.slice(0, -e1.length) : w1.slice(0, -e2.length);
                        const stem2 = w2.endsWith(e1) ? w2.slice(0, -e1.length) : w2.slice(0, -e2.length);
                        if (stem1 === stem2 && stem1.length > 0) {
                            morphMatch = true;
                            break;
                        }
                    }
                }
                if (morphMatch) {
                    morphCount++;
                    continue;
                }
            }
            
            // Определяем преобладающий тип
            if (totalCompared === 0) return 'lexical';
            
            const maxCount = Math.max(graphicCount, phoneticCount, morphCount);
            
            if (maxCount === 0) return 'lexical';
            if (maxCount === graphicCount) return 'graphic';
            if (maxCount === phoneticCount) return 'phonetic';
            if (maxCount === morphCount) return 'morph';
            
            return 'lexical';
        }
        
        function getDiffClass(type) {
            if (!type) return '';
            const classes = {
                'graphic': 'diff-graphic',
                'phonetic': 'diff-phonetic',
                'morph': 'diff-morph',
                'lexical': 'diff-lexical',
                'syntax': 'diff-syntax'
            };
            return classes[type] || '';
        }
        
        // Анализ разночтений для всей таблицы
        function analyzeAllDiffs() {
            if (!alignedData) return;
            
            alignedData.verses.forEach(verse => {
                verse.diffTypes = verse.diffTypes || [];
                const mainText = verse.texts[0];
                
                for (let i = 1; i < verse.texts.length; i++) {
                    const otherText = verse.texts[i];
                    const diffType = detectDiffType(mainText, otherText);
                    verse.diffTypes[i] = diffType;
                }
            });
        }

        function renderDiffFilters() {
            let html = '<div class="diff-filters">';
            html += '<div class="diff-filters-title">🔬 Типы разночтений:</div>';
            html += '<div class="diff-filters-list">';
            
            const filters = [
                { id: 'graphic', name: 'Графические', color: '#c0392b' },
                { id: 'phonetic', name: 'Фонетические', color: '#d4a017' },
                { id: 'morph', name: 'Морфологические', color: '#27ae60' },
                { id: 'lexical', name: 'Лексические', color: '#8e44ad' },
                { id: 'syntax', name: 'Синтаксические', color: '#2980b9' }
            ];
            
            filters.forEach(f => {
                const checked = diffTypesEnabled[f.id] ? 'checked' : '';
                html += `
                    <div class="diff-filter-item" onclick="toggleDiffType('${f.id}')">
                        <input type="checkbox" id="diff_${f.id}" ${checked}>
                        <span class="color-badge" style="background: ${f.color};"></span>
                        <label for="diff_${f.id}">${f.name}</label>
                    </div>
                `;
            });
            
            html += '</div>';
            html += '<div style="margin-top: 12px;">';
            html += '<button class="btn-secondary" onclick="selectAllDiffTypes()" style="padding: 6px 12px; margin-right: 8px;">✓ Выбрать все</button>';
            html += '<button class="btn-secondary" onclick="deselectAllDiffTypes()" style="padding: 6px 12px;">✗ Снять все</button>';
            html += '</div>';
            html += '</div>';
            
            return html;
        }
        
        window.toggleDiffType = function(type) {
            const checkbox = document.getElementById(`diff_${type}`);
            if (checkbox) {
                diffTypesEnabled[type] = checkbox.checked;
                applyDiffHighlights();
            }
        };
        
        window.selectAllDiffTypes = function() {
            Object.keys(diffTypesEnabled).forEach(key => diffTypesEnabled[key] = true);
            document.querySelectorAll('.diff-filters-list input').forEach(cb => cb.checked = true);
            applyDiffHighlights();
        };
        
        window.deselectAllDiffTypes = function() {
            Object.keys(diffTypesEnabled).forEach(key => diffTypesEnabled[key] = false);
            document.querySelectorAll('.diff-filters-list input').forEach(cb => cb.checked = false);
            applyDiffHighlights();
        };
        
        function applyDiffHighlights() {
            if (!alignedData) return;
            
            const rows = document.querySelectorAll('.alignment-table tbody tr');
            
            alignedData.verses.forEach((verse, rowIndex) => {
                const row = rows[rowIndex];
                if (!row) return;
                
                const cells = row.querySelectorAll('td.verse-text');
                const mainText = verse.texts[0];
                
                // Первая ячейка — главный текст (не подсвечиваем)
                
                // Остальные ячейки
                for (let i = 1; i < cells.length; i++) {
                    const cell = cells[i];
                    const otherText = verse.texts[i];
                    
                    // Убираем старые классы
                    cell.classList.remove('diff-graphic', 'diff-phonetic', 'diff-morph', 'diff-lexical', 'diff-syntax');
                    
                    const diffType = detectDiffType(mainText, otherText);
                    verse.diffTypes = verse.diffTypes || [];
                    verse.diffTypes[i] = diffType;
                    
                    // Применяем класс, если тип включен
                    if (diffType && diffTypesEnabled[diffType]) {
                        cell.classList.add(getDiffClass(diffType));
                    }
                }
            });
        }
        
        // Отрисовка таблицы с учётом порядка колонок
        function renderOrderedTable() {
            const container = document.getElementById('alignmentResult');
            const startSheet = folioStart.value || '?';
            const endSheet = folioEnd.value || '?';
            
            initColumnOrder();
            
            // Анализируем разночтения
            analyzeAllDiffs();
            
            let html = '<h3 style="margin: 24px 0 16px; color: #3e3225;">📖 Результат выравнивания</h3>';
            html += `<p style="margin-bottom: 8px; color: #6b5a4a;">Листы главного списка: ${startSheet}–${endSheet}</p>`;
            html += '<p style="margin-bottom: 8px; font-size: 13px; color: #8b7355;">✏️ Двойной клик по ячейке — редактирование</p>';
            html += '<p style="margin-bottom: 8px; font-size: 13px; color: #8b7355;">↕️ Перетащите заголовок колонки, чтобы изменить порядок</p>';
            
            // Панель фильтрации типов разночтений
            html += renderDiffFilters();
            
            // Панель выбора колонок
            html += renderColumnToggles();
            
            // Все имена списков
            const allNames = [alignedData.main, ...alignedData.aligned];
            
            // Таблица
            html += '<table class="alignment-table"><thead><tr><th>Стих</th>';
            
            // Заголовки в порядке columnOrder
            columnOrder.forEach((idx, pos) => {
                const isMain = idx === 0;
                const name = allNames[idx];
                const draggableClass = isMain ? '' : 'draggable';
                const mainBadge = isMain ? ' (главный)' : '';
                html += `<th class="${draggableClass}" data-col-index="${idx}" data-col-pos="${pos}" draggable="${!isMain}">${name}${mainBadge}</th>`;
            });
            
            html += '</tr></thead><tbody>';
            
            alignedData.verses.forEach(verse => {
                html += '<tr><td><strong>' + verse.num + '</strong></td>';
                columnOrder.forEach(idx => {
                    const text = verse.texts[idx] || '—';
                    html += '<td class="verse-text" data-col="' + idx + '">' + escapeHtml(text) + '</td>';
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            
            // Кнопки
            html += `
                <div style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="btn btn-secondary" onclick="saveSession()">💾 Сохранить сессию</button>
                    <button class="btn btn-secondary" onclick="loadSession()">📂 Загрузить сессию</button>
                    <button class="btn btn-secondary" onclick="updateAlignedDataFromTable(); alert('✅ Правки зафиксированы')">✏️ Зафиксировать правки</button>
                    <button class="btn btn-secondary" onclick="resetColumnOrder()">🔄 Сбросить порядок</button>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Навешиваем обработчики drag & drop
            setupDragAndDrop();
            
            // Применяем видимость колонок
            applyColumnVisibility();
            
            // Применяем подсветку разночтений
            applyDiffHighlights();
            
            // Включаем редактирование
            makeEditable();
        }
        
        // Настройка Drag & Drop
        function setupDragAndDrop() {
            const headers = document.querySelectorAll('.alignment-table th.draggable');
            
            headers.forEach(th => {
                th.addEventListener('dragstart', handleDragStart);
                th.addEventListener('dragend', handleDragEnd);
                th.addEventListener('dragover', handleDragOver);
                th.addEventListener('dragenter', handleDragEnter);
                th.addEventListener('dragleave', handleDragLeave);
                th.addEventListener('drop', handleDrop);
            });
        }
        
        let dragSourceIndex = null;
        
        function handleDragStart(e) {
            const th = e.target.closest('th');
            if (!th) return;
            
            dragSourceIndex = parseInt(th.dataset.colPos);
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragSourceIndex);
            th.classList.add('dragging');
        }
        
        function handleDragEnd(e) {
            const th = e.target.closest('th');
            if (th) th.classList.remove('dragging');
            
            document.querySelectorAll('.alignment-table th').forEach(h => {
                h.classList.remove('drag-over');
            });
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }
        
        function handleDragEnter(e) {
            const th = e.target.closest('th');
            if (th && th.classList.contains('draggable')) {
                th.classList.add('drag-over');
            }
        }
        
        function handleDragLeave(e) {
            const th = e.target.closest('th');
            if (th) th.classList.remove('drag-over');
        }
        
        function handleDrop(e) {
            e.preventDefault();
            
            const targetTh = e.target.closest('th');
            if (!targetTh) return;
            
            targetTh.classList.remove('drag-over');
            
            const targetIndex = parseInt(targetTh.dataset.colPos);
            const sourceIndex = dragSourceIndex;
            
            if (sourceIndex === null || sourceIndex === targetIndex) return;
            
            // Получаем индексы в columnOrder
            const sourceOrderIdx = columnOrder[sourceIndex];
            const targetOrderIdx = columnOrder[targetIndex];
            
            // Нельзя перемещать главный список (индекс 0)
            if (sourceOrderIdx === 0 || targetOrderIdx === 0) {
                alert('Главный список всегда должен быть первым');
                return;
            }
            
            // Перемещаем
            if (moveColumn(sourceIndex, targetIndex)) {
                renderOrderedTable();
            }
        }
        
        window.resetColumnOrder = function() {
            if (!alignedData) return;
            const totalCols = 1 + alignedData.aligned.length;
            columnOrder = Array.from({ length: totalCols }, (_, i) => i);
            
            // Восстанавливаем исходный порядок текстов
            const allNames = [alignedData.main, ...alignedData.aligned];
            const originalOrder = Array.from({ length: totalCols }, (_, i) => i);
            
            alignedData.verses = alignedData.verses.map(verse => {
                const newTexts = originalOrder.map(idx => verse.texts[idx]);
                return { num: verse.num, texts: newTexts };
            });
            
            alignedData.aligned = allNames.slice(1);
            
            renderOrderedTable();
            alert('Порядок сброшен');
        };
        
        function renderAlignment() {
            const container = document.getElementById('alignmentResult');
            const startSheet = folioStart.value || '?';
            const endSheet = folioEnd.value || '?';
            
            let html = '<h3 style="margin: 24px 0 16px; color: #3e3225;">📖 Результат выравнивания</h3>';
            html += `<p style="margin-bottom: 8px; color: #6b5a4a;">Листы главного списка: ${startSheet}–${endSheet}</p>`;
            html += '<p style="margin-bottom: 16px; font-size: 13px; color: #8b7355;">✏️ Двойной клик по ячейке — редактирование</p>';
            
            // Панель выбора колонок
            html += renderColumnToggles();
            
            // Таблица
            html += '<table class="alignment-table"><thead><tr><th>Стих</th>';
            
            // Заголовки с data-атрибутами для скрытия
            html += '<th class="col-header" data-col="0">' + alignedData.main + ' (главный)</th>';
            alignedData.aligned.forEach((name, idx) => {
                html += '<th class="col-header" data-col="' + (idx + 1) + '">' + name + '</th>';
            });
            html += '</tr></thead><tbody>';
            
            alignedData.verses.forEach(verse => {
                html += '<tr><td><strong>' + verse.num + '</strong></td>';
                verse.texts.forEach((text, idx) => {
                    html += '<td class="verse-text" data-col="' + idx + '">' + escapeHtml(text) + '</td>';
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            
            // Кнопки
            html += `
                <div style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="btn btn-secondary" onclick="saveSession()">💾 Сохранить сессию</button>
                    <button class="btn btn-secondary" onclick="loadSession()">📂 Загрузить сессию</button>
                    <button class="btn btn-secondary" onclick="updateAlignedDataFromTable(); alert('✅ Правки зафиксированы')">✏️ Зафиксировать правки</button>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Применяем видимость колонок
            applyColumnVisibility();
            
            // Включаем редактирование
            makeEditable();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        // ==================== РУЧНОЕ РЕДАКТИРОВАНИЕ ====================

        function makeEditable() {
            document.querySelectorAll('.verse-text').forEach(cell => {
                // Убираем старые обработчики, чтобы не дублировались
                cell.removeEventListener('dblclick', handleDoubleClick);
                cell.addEventListener('dblclick', handleDoubleClick);
            });
        }
        
        function handleDoubleClick(e) {
            const cell = e.currentTarget;
            
            // Если уже редактируется — не трогаем
            if (cell.classList.contains('editing')) return;
            
            const originalText = cell.textContent;
            const row = cell.closest('tr');
            const cells = Array.from(row.querySelectorAll('.verse-text'));
            const colIndex = cells.indexOf(cell);
            
            // Создаём textarea
            const textarea = document.createElement('textarea');
            textarea.value = originalText;
            
            // Сохраняем оригинальный текст
            cell.classList.add('editing');
            cell.textContent = '';
            cell.appendChild(textarea);
            textarea.focus();
            
            // Функция сохранения
            const save = () => {
                const newText = textarea.value.trim() || originalText;
                cell.textContent = newText;
                cell.classList.remove('editing');
                
                // Обновляем alignedData
                if (alignedData) {
                    const rowIndex = Array.from(row.parentNode.children).indexOf(row);
                    if (alignedData.verses[rowIndex]) {
                        alignedData.verses[rowIndex].texts[colIndex] = newText;
                    }
                }
                
                // Подсвечиваем, что данные изменены
                exportBtn.disabled = false;
            };
            
            // Обработчики для textarea
            textarea.addEventListener('blur', save);
            
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    save();
                }
                if (e.key === 'Escape') {
                    cell.textContent = originalText;
                    cell.classList.remove('editing');
                }
            });
        }
        
        // Функция для обновления alignedData после любого редактирования
        function updateAlignedDataFromTable() {
            if (!alignedData) return;
            
            const rows = document.querySelectorAll('.alignment-table tbody tr');
            alignedData.verses.forEach((verse, rowIndex) => {
                if (rows[rowIndex]) {
                    const cells = rows[rowIndex].querySelectorAll('.verse-text');
                    verse.texts = Array.from(cells).map(cell => cell.textContent.trim());
                }
            });
        }
        
        // Сброс выделения при клике вне таблицы
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.verse-text')) {
                // Ничего не делаем, просто даём возможность завершить редактирование по blur
            }
        });
        
        // Сессии
        window.saveSession = function() {
            updateAlignedDataFromTable();
            const session = {
                files: uploadedFiles.map(f => f.name),
                aligned: alignedData,
                sheets: { start: folioStart.value, end: folioEnd.value },
                columnVisibility: columnVisibility,
                columnOrder: columnOrder,
                diffTypesEnabled: diffTypesEnabled,  // <-- ДОБАВИТЬ
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('corpusSession', JSON.stringify(session));
            alert('Сессия сохранена');
        };
        
        window.loadSession = function() {
            const saved = localStorage.getItem('corpusSession');
            if (saved) {
                const session = JSON.parse(saved);
                folioStart.value = session.sheets.start;
                folioEnd.value = session.sheets.end;
                if (session.columnVisibility) columnVisibility = session.columnVisibility;
                if (session.columnOrder) columnOrder = session.columnOrder;
                if (session.diffTypesEnabled) diffTypesEnabled = session.diffTypesEnabled;  // <-- ДОБАВИТЬ
                alert('Загружена сессия от ' + session.timestamp);
            } else {
                alert('Нет сохранённой сессии');
            }
        };
        
        // Экспорт XML
        exportBtn.addEventListener('click', () => {
            // Синхронизируем данные из таблицы перед экспортом
            updateAlignedDataFromTable();
            
            if (!alignedData) return;
            
            let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<TEI>\n  <teiHeader>\n    <fileDesc>\n      <titleStmt>\n        <title>Параллельный корпус: Притча о блудном сыне</title>\n      </titleStmt>\n      <sourceDesc>\n        <listWit>\n';
            xml += '          <witness xml:id="main">' + alignedData.main + '</witness>\n';
            alignedData.aligned.forEach((name, i) => xml += '          <witness xml:id="wit' + i + '">' + name + '</witness>\n');
            xml += '        </listWit>\n      </sourceDesc>\n    </fileDesc>\n  </teiHeader>\n  <text>\n    <body>\n';
            
            alignedData.verses.forEach(verse => {
                xml += '      <div type="verse" n="' + verse.num + '">\n';
                xml += '        <ab wit="#main">' + verse.texts[0] + '</ab>\n';
                verse.texts.slice(1).forEach((text, i) => {
                    xml += '        <ab wit="#wit' + i + '">' + text + '</ab>\n';
                });
                xml += '      </div>\n';
            });
            
            xml += '    </body>\n  </text>\n</TEI>';
            
            const blob = new Blob([xml], { type: 'application/xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'parallel_corpus.xml';
            a.click();
        });
    </script>
</body>
