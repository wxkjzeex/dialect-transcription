<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Параллельный корпус · Притча о блудном сыне</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'BukyVede', 'Menaion Unicode', 'Segoe UI', serif;
            background: #f5efe6;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffbf5;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #d4c5b0;
        }
        .header {
            background: linear-gradient(135deg, #4a3d2c 0%, #2c241a 100%);
            color: #f0e6d8;
            padding: 24px 32px;
            border-bottom: 3px solid #b89a7a;
        }
        .header h1 { font-size: 28px; font-weight: 400; letter-spacing: 2px; }
        .header p { opacity: 0.8; font-size: 14px; margin-top: 8px; }
        .tabs {
            display: flex;
            background: #e8ddd0;
            padding: 0 24px;
            gap: 4px;
        }
        .tab {
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            color: #6b5a4a;
            cursor: pointer;
            border-radius: 12px 12px 0 0;
            transition: all 0.2s;
        }
        .tab:hover { background: #d9cbbc; }
        .tab.active { background: #fffbf5; color: #4a3d2c; }
        .content { padding: 32px; }
        .upload-area {
            border: 2px dashed #c9af91;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover { border-color: #8b7355; background: #faf5ef; }
        .btn {
            padding: 12px 24px;
            background: #4a3d2c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #5d4e37; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #8b7355; }
        .file-list { margin-top: 16px; }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #f0eae2;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .file-remove { color: #a05040; cursor: pointer; font-weight: bold; }
        .controls {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .alignment-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
            font-size: 14px;
        }
        .alignment-table th {
            text-align: left;
            padding: 12px;
            background: #e8ddd0;
            color: #3e3225;
            font-weight: 600;
            border: 1px solid #d4c5b0;
        }
        .alignment-table td {
            padding: 12px;
            border: 1px solid #d4c5b0;
            vertical-align: top;
            font-family: 'BukyVede', 'Menaion Unicode', serif;
        }
        .alignment-table tr:hover td { background: #faf5ef; }
                .verse-text {
            font-size: 15px;
            color: #2c241a;
            cursor: text;
            transition: background 0.2s;
        }
        .verse-text:hover {
            background: #f0eae2;
        }
        .verse-text.editing {
            padding: 0;
        }
        .verse-text textarea {
            width: 100%;
            min-height: 80px;
            padding: 8px;
            font-family: 'BukyVede', 'Menaion Unicode', serif;
            font-size: 14px;
            border: 2px solid #b89a7a;
            border-radius: 6px;
            background: #fffbf5;
            resize: vertical;
        }
        .progress {
            margin: 20px 0;
            padding: 12px;
            background: #e8ddd0;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📜 Притча о блудном сыне</h1>
            <p>Параллельный корпус · Лк 15:11-32 · Лабораторная работа №2</p>
        </div>
        
        <div class="tabs">
            <div class="tab" onclick="window.location.href='/'">Транскрипция</div>
            <div class="tab active">Корпус</div>
            <div class="tab" onclick="window.location.href='/map'">Карта</div>
        </div>
        
        <div class="content">
            <div class="upload-area" id="dropZone">
                <div style="font-size: 48px; margin-bottom: 16px;">📂</div>
                <div style="font-size: 18px; margin-bottom: 8px;">Загрузите файлы списков</div>
                <div style="color: #9a8a78;">XML-TEI · Перетащите или нажмите для выбора</div>
                <input type="file" id="fileInput" multiple accept=".xml" style="display: none;">
            </div>
            
            <div id="fileList" class="file-list"></div>
            
            <div class="controls">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <label style="font-size: 13px; color: #3e3225;">Листы главного списка:</label>
                    <input type="number" id="folioStart" placeholder="От" min="1" max="500" value="117" style="width: 70px; padding: 8px; border-radius: 6px; border: 1px solid #d4c5b0;">
                    <span>–</span>
                    <input type="number" id="folioEnd" placeholder="До" min="1" max="500" value="119" style="width: 70px; padding: 8px; border-radius: 6px; border: 1px solid #d4c5b0;">
                </div>
                <button class="btn" id="alignBtn" disabled>🔗 Выровнять списки</button>
                <button class="btn btn-secondary" id="exportBtn" disabled>💾 Выгрузить XML-TEI</button>
                <select id="mainMsSelect" style="padding: 12px; border-radius: 8px; border: 1px solid #d4c5b0;" disabled>
                    <option value="">Выберите главный список</option>
                </select>
            </div>
            
            <div id="progress" style="display: none;"></div>
            <div id="alignmentResult"></div>
        </div>
    </div>

    <script>
        let uploadedFiles = [];
        let manuscripts = [];  // [{ name, fullText, sheets }]
        let alignedData = null;
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const alignBtn = document.getElementById('alignBtn');
        const exportBtn = document.getElementById('exportBtn');
        const mainMsSelect = document.getElementById('mainMsSelect');
        const progressDiv = document.getElementById('progress');
        const folioStart = document.getElementById('folioStart');
        const folioEnd = document.getElementById('folioEnd');
        
        // Drag & drop
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#8b7355';
            dropZone.style.background = '#faf5ef';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#c9af91';
            dropZone.style.background = 'transparent';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#c9af91';
            dropZone.style.background = 'transparent';
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        // Функция извлечения текста из XML
        function extractTextFromXML(xmlString) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlString, 'application/xml');
            
            const words = [];
            const sheets = [];
            let currentSheet = null;
            
            // Проходим по всем элементам в порядке их следования
            const allElements = doc.querySelectorAll('*');
            
            for (let el of allElements) {
                // Отслеживаем листы
                if (el.tagName === 'milestone' && el.getAttribute('unit') === 'sheet') {
                    const n = el.getAttribute('n');
                    if (n) {
                        currentSheet = parseInt(n);
                        if (!isNaN(currentSheet)) {
                            sheets.push({ index: words.length, sheet: currentSheet });
                        }
                    }
                }
                
                // Собираем текст из w и pc
                if (el.tagName === 'w' || el.tagName === 'pc') {
                    const t = el.textContent.trim();
                    if (t && !['·', '⸱', '※', '∽', ':', '.', '⁘'].includes(t)) {
                        words.push(t);
                    }
                }
            }
            
            return {
                fullText: words.join(' '),
                words: words,
                sheets: sheets
            };
        }
        
        // Фильтрация текста по листам
        function filterTextBySheets(data, startSheet, endSheet) {
            if (!startSheet || !endSheet) return data.fullText;
            
            const start = parseInt(startSheet);
            const end = parseInt(endSheet);
            
            // Находим индексы слов для указанных листов
            let startIdx = 0;
            let endIdx = data.words.length;
            
            for (let sheet of data.sheets) {
                if (sheet.sheet === start) {
                    startIdx = sheet.index;
                }
                if (sheet.sheet === end + 1) {
                    endIdx = sheet.index;
                    break;
                }
            }
            
            return data.words.slice(startIdx, endIdx).join(' ');
        }
        
        // Разбиение текста на стихи
        function splitIntoVerses(text, verseCount = 22, startVerse = 11) {
            const verses = {};
            const allWords = text.split(/\s+/).filter(w => w.length > 0);
            const chunkSize = Math.ceil(allWords.length / verseCount);
            
            for (let v = 0; v < verseCount; v++) {
                const start = v * chunkSize;
                const end = Math.min((v + 1) * chunkSize, allWords.length);
                const verseText = allWords.slice(start, end).join(' ');
                if (verseText) {
                    verses[String(v + startVerse)] = verseText.substring(0, 400) + (verseText.length > 400 ? '...' : '');
                }
            }
            
            return verses;
        }
        
        async function handleFiles(files) {
            for (let file of files) {
                if (file.name.endsWith('.xml') && !uploadedFiles.find(f => f.name === file.name)) {
                    uploadedFiles.push(file);
                }
            }
            renderFileList();
            
            if (uploadedFiles.length > 0) {
                progressDiv.style.display = 'block';
                progressDiv.className = 'progress';
                progressDiv.innerHTML = '⏳ Парсинг XML-файлов...';
                
                manuscripts = [];
                
                for (let i = 0; i < uploadedFiles.length; i++) {
                    const file = uploadedFiles[i];
                    progressDiv.innerHTML = `⏳ Парсинг ${i+1}/${uploadedFiles.length}: ${file.name}...`;
                    
                    try {
                        const xmlText = await file.text();
                        const extracted = extractTextFromXML(xmlText);
                        
                        manuscripts.push({
                            name: file.name,
                            data: extracted,
                        });
                        
                    } catch (err) {
                        console.error('Ошибка парсинга:', file.name, err);
                        manuscripts.push({
                            name: file.name,
                            data: { fullText: '[Ошибка парсинга]', words: [], sheets: [] }
                        });
                    }
                }
                
                progressDiv.innerHTML = '✅ Парсинг завершён!';
                setTimeout(() => { progressDiv.style.display = 'none'; }, 1500);
            }
            
            updateUI();
        }
        
        function renderFileList() {
            if (uploadedFiles.length === 0) {
                fileList.innerHTML = '';
                return;
            }
            let html = '<h3 style="margin-bottom: 12px; color: #3e3225;">Загруженные списки:</h3>';
            uploadedFiles.forEach((file, index) => {
                html += `
                    <div class="file-item">
                        <span>📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)</span>
                        <span class="file-remove" onclick="removeFile(${index})">✕</span>
                    </div>
                `;
            });
            fileList.innerHTML = html;
            
            let options = '<option value="">Выберите главный список</option>';
            uploadedFiles.forEach((file, index) => {
                options += `<option value="${index}">${file.name}</option>`;
            });
            mainMsSelect.innerHTML = options;
        }
        
        window.removeFile = function(index) {
            uploadedFiles.splice(index, 1);
            manuscripts.splice(index, 1);
            renderFileList();
            updateUI();
        };
        
        function updateUI() {
            alignBtn.disabled = uploadedFiles.length < 2;
            exportBtn.disabled = !alignedData;
            mainMsSelect.disabled = uploadedFiles.length < 2;
        }
        
        // Выравнивание (учитывает листы)
        alignBtn.addEventListener('click', () => {
            if (uploadedFiles.length < 2) return;
            
            const mainIndex = parseInt(mainMsSelect.value);
            if (isNaN(mainIndex)) {
                alert('Выберите главный список');
                return;
            }
            
            const startSheet = folioStart.value;
            const endSheet = folioEnd.value;
            
            // Фильтруем текст главного списка по листам
            const mainMs = manuscripts[mainIndex];
            const mainText = filterTextBySheets(mainMs.data, startSheet, endSheet);
            const mainVerses = splitIntoVerses(mainText);
            
            // Для остальных списков берём полный текст
            const otherMss = manuscripts.filter((_, i) => i !== mainIndex);
            const otherVerses = otherMss.map(ms => splitIntoVerses(ms.data.fullText));
            
            // Собираем все номера стихов
            const allVerseNums = new Set(Object.keys(mainVerses));
            otherVerses.forEach(v => Object.keys(v).forEach(k => allVerseNums.add(k)));
            const verseNumbers = Array.from(allVerseNums).sort((a, b) => parseInt(a) - parseInt(b));
            
            alignedData = {
                main: mainMs.name,
                aligned: otherMss.map(m => m.name),
                verses: verseNumbers.map(num => {
                    const texts = [mainVerses[num] || '—'];
                    otherVerses.forEach(v => texts.push(v[num] || '—'));
                    return { num, texts };
                })
            };
            
            renderAlignment();
            exportBtn.disabled = false;
        });
        
        function renderAlignment() {
            const container = document.getElementById('alignmentResult');
            const startSheet = folioStart.value || '?';
            const endSheet = folioEnd.value || '?';
            
            let html = '<h3 style="margin: 24px 0 16px; color: #3e3225;">📖 Результат выравнивания</h3>';
            html += `<p style="margin-bottom: 16px; color: #6b5a4a;">Листы главного списка: ${startSheet}–${endSheet}</p>`;
            html += '<p style="margin-bottom: 16px; font-size: 13px; color: #8b7355;">✏️ Двойной клик по ячейке — редактирование</p>';
            html += '<table class="alignment-table"><thead><tr><th>Стих</th><th>' + alignedData.main + '</th>';
            alignedData.aligned.forEach(name => html += '<th>' + name + '</th>');
            html += '</tr></thead><tbody>';
            
            alignedData.verses.forEach(verse => {
                html += '<tr><td><strong>' + verse.num + '</strong></td>';
                verse.texts.forEach(text => {
                    html += '<td class="verse-text">' + escapeHtml(text) + '</td>';
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            html += `
                <div style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="btn btn-secondary" onclick="saveSession()">💾 Сохранить сессию</button>
                    <button class="btn btn-secondary" onclick="loadSession()">📂 Загрузить сессию</button>
                    <button class="btn btn-secondary" onclick="updateAlignedDataFromTable(); alert('✅ Правки зафиксированы')">✏️ Зафиксировать правки</button>
                </div>
            `;
            container.innerHTML = html;
            
            // Включаем редактирование
            makeEditable();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        // ==================== РУЧНОЕ РЕДАКТИРОВАНИЕ ====================

        function makeEditable() {
            document.querySelectorAll('.verse-text').forEach(cell => {
                // Убираем старые обработчики, чтобы не дублировались
                cell.removeEventListener('dblclick', handleDoubleClick);
                cell.addEventListener('dblclick', handleDoubleClick);
            });
        }
        
        function handleDoubleClick(e) {
            const cell = e.currentTarget;
            
            // Если уже редактируется — не трогаем
            if (cell.classList.contains('editing')) return;
            
            const originalText = cell.textContent;
            const row = cell.closest('tr');
            const cells = Array.from(row.querySelectorAll('.verse-text'));
            const colIndex = cells.indexOf(cell);
            
            // Создаём textarea
            const textarea = document.createElement('textarea');
            textarea.value = originalText;
            
            // Сохраняем оригинальный текст
            cell.classList.add('editing');
            cell.textContent = '';
            cell.appendChild(textarea);
            textarea.focus();
            
            // Функция сохранения
            const save = () => {
                const newText = textarea.value.trim() || originalText;
                cell.textContent = newText;
                cell.classList.remove('editing');
                
                // Обновляем alignedData
                if (alignedData) {
                    const rowIndex = Array.from(row.parentNode.children).indexOf(row);
                    if (alignedData.verses[rowIndex]) {
                        alignedData.verses[rowIndex].texts[colIndex] = newText;
                    }
                }
                
                // Подсвечиваем, что данные изменены
                exportBtn.disabled = false;
            };
            
            // Обработчики для textarea
            textarea.addEventListener('blur', save);
            
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    save();
                }
                if (e.key === 'Escape') {
                    cell.textContent = originalText;
                    cell.classList.remove('editing');
                }
            });
        }
        
        // Функция для обновления alignedData после любого редактирования
        function updateAlignedDataFromTable() {
            if (!alignedData) return;
            
            const rows = document.querySelectorAll('.alignment-table tbody tr');
            alignedData.verses.forEach((verse, rowIndex) => {
                if (rows[rowIndex]) {
                    const cells = rows[rowIndex].querySelectorAll('.verse-text');
                    verse.texts = Array.from(cells).map(cell => cell.textContent.trim());
                }
            });
        }
        
        // Сброс выделения при клике вне таблицы
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.verse-text')) {
                // Ничего не делаем, просто даём возможность завершить редактирование по blur
            }
        });
        
        // Сессии
        window.saveSession = function() {
            const session = {
                files: uploadedFiles.map(f => f.name),
                aligned: alignedData,
                sheets: { start: folioStart.value, end: folioEnd.value },
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('corpusSession', JSON.stringify(session));
            alert('Сессия сохранена');
        };
        
        window.loadSession = function() {
            const saved = localStorage.getItem('corpusSession');
            if (saved) {
                const session = JSON.parse(saved);
                folioStart.value = session.sheets.start;
                folioEnd.value = session.sheets.end;
                alert('Загружена сессия от ' + session.timestamp + '\nЗагрузите те же файлы и нажмите "Выровнять"');
            } else {
                alert('Нет сохранённой сессии');
            }
        };
        
        // Экспорт XML
        exportBtn.addEventListener('click', () => {
            // Синхронизируем данные из таблицы перед экспортом
            updateAlignedDataFromTable();
            
            if (!alignedData) return;
            
            let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<TEI>\n  <teiHeader>\n    <fileDesc>\n      <titleStmt>\n        <title>Параллельный корпус: Притча о блудном сыне</title>\n      </titleStmt>\n      <sourceDesc>\n        <listWit>\n';
            xml += '          <witness xml:id="main">' + alignedData.main + '</witness>\n';
            alignedData.aligned.forEach((name, i) => xml += '          <witness xml:id="wit' + i + '">' + name + '</witness>\n');
            xml += '        </listWit>\n      </sourceDesc>\n    </fileDesc>\n  </teiHeader>\n  <text>\n    <body>\n';
            
            alignedData.verses.forEach(verse => {
                xml += '      <div type="verse" n="' + verse.num + '">\n';
                xml += '        <ab wit="#main">' + verse.texts[0] + '</ab>\n';
                verse.texts.slice(1).forEach((text, i) => {
                    xml += '        <ab wit="#wit' + i + '">' + text + '</ab>\n';
                });
                xml += '      </div>\n';
            });
            
            xml += '    </body>\n  </text>\n</TEI>';
            
            const blob = new Blob([xml], { type: 'application/xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'parallel_corpus.xml';
            a.click();
        });
    </script>
</body>
</html>
